{% extends "base.html" %}
{% block title %}Training in Progress{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="bg-amber-500 px-6 py-4">
            <h5 class="text-white font-semibold flex items-center gap-2">
                <i class="bi bi-gear-wide-connected"></i>Training in Progress
            </h5>
        </div>
        <div class="p-8 text-center">
            <div id="spinner" class="inline-block w-10 h-10 border-4 border-amber-200 border-t-amber-500 rounded-full animate-spin mb-4"></div>
            <h5 id="status-message" class="text-lg font-semibold text-gray-800 mb-4">Initializing...</h5>
            <div class="max-w-md mx-auto">
                <div class="w-full bg-gray-200 rounded-full h-6 overflow-hidden">
                    <div id="progress-bar"
                         class="h-full bg-amber-500 rounded-full text-white text-xs font-medium flex items-center justify-center transition-all duration-300"
                         style="width: 0%">0%</div>
                </div>
            </div>
            <div id="elapsed" class="text-gray-400 text-sm mt-3">Elapsed: 0s</div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const jobId = "{{ job_id }}";
const statusUrl = `/train/status/${jobId}`;
const resultsUrl = `/train/results/${jobId}`;

function poll() {
    fetch(statusUrl)
        .then(r => r.json())
        .then(data => {
            document.getElementById('status-message').textContent = data.message || data.status;
            const bar = document.getElementById('progress-bar');
            bar.style.width = data.progress + '%';
            bar.textContent = data.progress + '%';
            document.getElementById('elapsed').textContent = 'Elapsed: ' + data.elapsed + 's';

            if (data.status === 'complete') {
                window.location.href = resultsUrl;
            } else if (data.status === 'error') {
                document.getElementById('spinner').classList.add('hidden');
                document.getElementById('status-message').innerHTML =
                    '<span class="text-red-600">Error: ' + data.error + '</span>';
                bar.classList.remove('bg-amber-500');
                bar.classList.add('bg-red-500');
            } else {
                setTimeout(poll, 2000);
            }
        })
        .catch(() => setTimeout(poll, 3000));
}
poll();
</script>
{% endblock %}
