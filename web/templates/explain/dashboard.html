{% extends "base.html" %}
{% block title %}Explainability{% endblock %}

{% block content %}
<h4 class="mb-3"><i class="bi bi-diagram-3 me-2"></i>Model Explainability Dashboard</h4>
<p class="text-muted">SHAP-based explanations showing how each biomarker contributes to predictions.</p>

<div class="mb-3">
    <label class="form-label fw-semibold">Model:</label>
    <select id="model-select" class="form-select d-inline-block" style="width: auto;">
        {% for m in models %}
        <option value="{{ m.name }}" {% if m.name == active_model %}selected{% endif %}>{{ m.name }}</option>
        {% endfor %}
    </select>
</div>

<!-- Plot Tabs -->
<ul class="nav nav-tabs mb-3" role="tablist">
    <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-shap-summary">SHAP Summary</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-shap-bar">Feature Importance</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-boundary">Decision Boundary</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-roc">ROC Curves</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-calibration">Calibration</button>
    </li>
</ul>

<div class="tab-content">
    <div class="tab-pane fade show active" id="tab-shap-summary">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <img id="img-shap-summary" class="img-fluid" loading="lazy"
                     src="{{ url_for('explain.shap_summary_png', model=active_model) }}"
                     alt="SHAP Summary Plot">
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="tab-shap-bar">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <img id="img-shap-bar" class="img-fluid" loading="lazy"
                     src="{{ url_for('explain.shap_bar_png', model=active_model) }}"
                     alt="SHAP Bar Plot">
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="tab-boundary">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <img id="img-boundary" class="img-fluid" loading="lazy"
                     src="{{ url_for('explain.decision_boundary_png', model=active_model) }}"
                     alt="Decision Boundary">
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="tab-roc">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <img class="img-fluid" loading="lazy"
                     src="{{ url_for('explain.roc_curves_png') }}"
                     alt="ROC Curves">
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="tab-calibration">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <img class="img-fluid" loading="lazy"
                     src="{{ url_for('explain.calibration_png') }}"
                     alt="Calibration Curves">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('model-select').addEventListener('change', function() {
    const model = this.value;
    document.getElementById('img-shap-summary').src = '/explain/shap-summary.png?model=' + model;
    document.getElementById('img-shap-bar').src = '/explain/shap-bar.png?model=' + model;
    document.getElementById('img-boundary').src = '/explain/decision-boundary.png?model=' + model;
});
</script>
{% endblock %}
