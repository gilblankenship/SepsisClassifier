# Nginx reverse proxy configuration for SepsisDx
# Installed to: /etc/nginx/sites-available/sepsis-dx

upstream sepsis_dx_app {
    server 127.0.0.1:8082 fail_timeout=0;
}

server {
    # cloudflared connects to this port; no SSL cert needed (localhost only)
    listen 127.0.0.1:8443;
    server_name sepsis-dx.com www.sepsis-dx.com;

    # Logging
    access_log /var/log/nginx/sepsis-dx-access.log;
    error_log  /var/log/nginx/sepsis-dx-error.log;

    # Max upload size (CSV batch files)
    client_max_body_size 50M;

    # Timeouts (ML training and SHAP can be slow — gunicorn timeout = 300s)
    proxy_connect_timeout  30s;
    proxy_send_timeout    310s;
    proxy_read_timeout    310s;
    send_timeout          310s;

    # Buffer settings
    proxy_buffering        on;
    proxy_buffer_size      16k;
    proxy_buffers          8 64k;
    proxy_busy_buffers_size 128k;

    # Security headers
    add_header X-Content-Type-Options    nosniff       always;
    add_header X-Frame-Options           DENY          always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           strict-origin-when-cross-origin always;

    # Static files - served directly by nginx (bypass gunicorn)
    location /static/ {
        alias /opt/sepsis-dx/web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon
    location /favicon.ico {
        alias /opt/sepsis-dx/web/static/favicon.ico;
        expires 30d;
    }

    # Application routes - proxy to gunicorn
    location / {
        proxy_pass http://sepsis_dx_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
    }

    # Block direct access to Python files
    location ~* \.(py|pyc)$ {
        deny all;
    }
}
