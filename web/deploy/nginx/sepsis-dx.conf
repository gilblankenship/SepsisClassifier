server {
    listen 127.0.0.1:8443;
    server_name sepsis-dx.com www.sepsis-dx.com;

    # Static files served directly by nginx
    location /static/ {
        alias /opt/sepsis-dx/web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy everything else to gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Timeouts (must be >= gunicorn timeout = 300s for ML training)
        proxy_connect_timeout  30s;
        proxy_send_timeout    310s;
        proxy_read_timeout    310s;

        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         8 64k;
        proxy_busy_buffers_size 128k;

        # Allow large CSV uploads
        client_max_body_size  50M;
    }

    access_log  /var/log/sepsis-dx/nginx-access.log;
    error_log   /var/log/sepsis-dx/nginx-error.log;
}
